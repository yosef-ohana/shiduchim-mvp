spring.application.name=backend
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/shiduchim?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=shiduchim_user
spring.datasource.password=shiduchim_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Auth Token Configuration
app.auth.token-secret=dev-change-me-shiduchim-mvp-secret
app.auth.token-expiration-days=7

# Photo Upload Configuration
app.upload.dir=uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

services:
  mysql:
    image: mysql:8.0
    container_name: shiduchim_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: shiduchim
      MYSQL_USER: shiduchim_user
      MYSQL_PASSWORD: shiduchim_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
